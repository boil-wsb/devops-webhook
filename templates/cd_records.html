<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD 记录管理</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="page-header">
        <h1>📊 CD 记录管理</h1>
        <div class="header-actions">
            <a href="{{ return_url }}" class="page-nav-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                返回项目清单
            </a>
            <button class="page-nav-btn" onclick="toggleTheme()" id="themeToggleBtn">
                <span id="themeIcon">🌙</span>
                <span id="themeText">深色模式</span>
            </button>
        </div>
    </header>

    <div class="cd-records-container">
        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-item">
                    <label>项目名称</label>
                    <div class="combobox" data-filter="project" id="project-combobox">
                        <input type="text" class="combobox-input" placeholder="搜索或选择项目...">
                        <button class="combobox-toggle" tabindex="-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <div class="combobox-dropdown"></div>
                    </div>
                </div>
                <div class="filter-item">
                    <label>分支</label>
                    <div class="combobox" data-filter="branch" id="branch-combobox">
                        <input type="text" class="combobox-input" placeholder="搜索或选择分支..." disabled>
                        <button class="combobox-toggle" tabindex="-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <div class="combobox-dropdown"></div>
                    </div>
                </div>
                <div class="filter-item">
                    <label>状态</label>
                    <div class="combobox" data-filter="status" id="status-combobox">
                        <input type="text" class="combobox-input" placeholder="搜索或选择状态...">
                        <button class="combobox-toggle" tabindex="-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <div class="combobox-dropdown"></div>
                    </div>
                </div>
                <div class="filter-item">
                    <label>提交人员</label>
                    <div class="combobox" data-filter="user" id="user-combobox">
                        <input type="text" class="combobox-input" placeholder="搜索或选择人员...">
                        <button class="combobox-toggle" tabindex="-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <div class="combobox-dropdown"></div>
                    </div>
                </div>
                <div class="filter-item">
                    <label>部署IP</label>
                    <div class="combobox" data-filter="ip" id="ip-combobox">
                        <input type="text" class="combobox-input" placeholder="搜索或选择IP...">
                        <button class="combobox-toggle" tabindex="-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <div class="combobox-dropdown"></div>
                    </div>
                </div>
                <div class="filter-item">
                    <label for="search-filter">搜索</label>
                    <input type="text" id="search-filter" placeholder="输入搜索内容...">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: flex-end; gap: 8px;">
                    <button class="filter-btn secondary" onclick="resetFilters()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                        重置
                    </button>
                </div>
            </div>
        </div>

        <div class="records-section">
            <div style="overflow-x: auto;">
                <table class="records-table" id="records-table">
                    <colgroup>
                        <col style="width: 160px; min-width: 100px;">
                        <col style="width: 140px; min-width: 80px;">
                        <col style="width: 110px; min-width: 70px;">
                        <col style="width: 90px; min-width: 60px;">
                        <col style="width: 150px; min-width: 100px;">
                        <col style="width: 90px; min-width: 60px;">
                        <col style="width: 120px; min-width: 80px;">
                        <col style="min-width: 120px;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">
                                项目名称
                                <span class="sort-indicator">▲</span>
                                <div class="resize-handle"></div>
                            </th>
                            <th onclick="sortTable(1)">
                                分支
                                <span class="sort-indicator"></span>
                                <div class="resize-handle"></div>
                            </th>
                            <th onclick="sortTable(2)">
                                提交人员
                                <span class="sort-indicator"></span>
                                <div class="resize-handle"></div>
                            </th>
                            <th onclick="sortTable(3)">
                                流水线ID
                                <span class="sort-indicator"></span>
                                <div class="resize-handle"></div>
                            </th>
                            <th onclick="sortTable(4)">
                                推送时间
                                <span class="sort-indicator"></span>
                                <div class="resize-handle"></div>
                            </th>
                            <th onclick="sortTable(5)">
                                状态
                                <span class="sort-indicator"></span>
                                <div class="resize-handle"></div>
                            </th>
                            <th>
                                部署IP
                                <div class="resize-handle"></div>
                            </th>
                            <th onclick="sortTable(7)">
                                提交信息
                                <span class="sort-indicator"></span>
                                <div class="resize-handle"></div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                        <tr>
                            <td colspan="8" class="loading">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite; margin-bottom: 8px;">
                                    <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                                </svg>
                                <div>加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-footer">
                <div class="total-records" id="total-records"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <div id="customTooltip" class="custom-tooltip"></div>

    <div id="logDetailModal" class="modal">
        <div class="modal-content log-detail-modal">
            <div class="modal-header">
                <h2 id="logModalTitle">📄 构建日志</h2>
                <button class="close" onclick="closeLogDetailModal()">&times;</button>
            </div>
            <div class="log-toolbar">
                <input type="text" id="logSearchInput" placeholder="搜索关键字..." onkeyup="highlightLogSearch(event)">
                <button onclick="highlightLogSearch()">搜索</button>
                <button onclick="downloadLogFile()">下载日志</button>
            </div>
            <div class="log-content" id="logContent">
                <pre id="logPreContent"></pre>
            </div>
            <div class="error-summary" id="errorSummarySection">
                <h3>🔍 错误摘要</h3>
                <pre id="errorSummaryContent"></pre>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (newTheme === 'dark') {
                themeIcon.textContent = '☀️';
                themeText.textContent = '浅色模式';
            } else {
                themeIcon.textContent = '🌙';
                themeText.textContent = '深色模式';
            }
        }

        let allRecords = [];
        let filteredRecords = [];
        let currentPage = 1;
        let recordsPerPage = 10;
        let currentSortColumn = 4;
        let currentSortDirection = 'desc';

        const comboboxInstances = {};

        class Combobox {
            constructor(container) {
                this.container = container;
                this.input = container.querySelector('.combobox-input');
                this.toggle = container.querySelector('.combobox-toggle');
                this.dropdown = container.querySelector('.combobox-dropdown');
                this.filterName = container.dataset.filter;
                this.value = '';
                this._selectedDisplayText = '';
                this.options = [];
                this.isOpen = false;
                this.highlightIndex = -1;
                this._bindEvents();
            }

            _bindEvents() {
                this.input.addEventListener('focus', () => {
                    if (this.value !== '' && this._selectedDisplayText) {
                        this.input.value = '';
                    }
                    this._open();
                });
                this.input.addEventListener('blur', () => {
                    if (this.value !== '' && this._selectedDisplayText) {
                        this.input.value = this._selectedDisplayText;
                    } else {
                        this.input.value = '';
                    }
                });
                this.input.addEventListener('input', () => this._filterOptions());
                this.input.addEventListener('keydown', (e) => this._handleKeydown(e));
                this.toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (this.isOpen) this._close(); else { this.input.focus(); this._open(); }
                });
                document.addEventListener('click', (e) => {
                    if (!this.container.contains(e.target)) this._close();
                });
            }

            _open() {
                if (this.input.disabled) return;
                this.isOpen = true;
                this.dropdown.classList.add('show');
                this._filterOptions();
            }

            _close() {
                this.isOpen = false;
                this.dropdown.classList.remove('show');
                this.highlightIndex = -1;
            }

            _filterOptions() {
                const query = this.input.value.toLowerCase().trim();
                const items = this.dropdown.querySelectorAll('.combobox-option');
                let visibleCount = 0;
                items.forEach(item => {
                    const text = item.textContent.toLowerCase();
                    const match = !query || text.includes(query);
                    item.style.display = match ? '' : 'none';
                    if (match) visibleCount++;
                });
                this.dropdown.classList.toggle('no-results', visibleCount === 0);
            }

            _handleKeydown(e) {
                const visibleItems = Array.from(this.dropdown.querySelectorAll('.combobox-option')).filter(i => i.style.display !== 'none');
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    this.highlightIndex = Math.min(this.highlightIndex + 1, visibleItems.length - 1);
                    this._updateHighlight(visibleItems);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    this.highlightIndex = Math.max(this.highlightIndex - 1, 0);
                    this._updateHighlight(visibleItems);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (this.highlightIndex >= 0 && visibleItems[this.highlightIndex]) {
                        this._selectOption(visibleItems[this.highlightIndex]);
                    }
                } else if (e.key === 'Escape') {
                    this._close();
                    this.input.blur();
                }
            }

            _updateHighlight(visibleItems) {
                visibleItems.forEach((item, i) => item.classList.toggle('highlighted', i === this.highlightIndex));
                if (this.highlightIndex >= 0 && visibleItems[this.highlightIndex]) {
                    visibleItems[this.highlightIndex].scrollIntoView({ block: 'nearest' });
                }
            }

            _selectOption(optionEl) {
                const value = optionEl.dataset.value;
                const text = optionEl.textContent;
                this.value = value;
                this._selectedDisplayText = value === '' ? '' : text;
                this.input.value = value === '' ? '' : text;
                this._close();
                applyFilters();
            }

            setDisabled(disabled) {
                this.input.disabled = disabled;
                if (disabled) {
                    this._close();
                    this.container.classList.add('disabled');
                } else {
                    this.container.classList.remove('disabled');
                }
            }

            setValue(value) {
                this.value = value;
                if (value === '') {
                    this.input.value = '';
                    this._selectedDisplayText = '';
                } else {
                    const matchOption = this.dropdown.querySelector(`.combobox-option[data-value="${CSS.escape(value)}"]`);
                    this._selectedDisplayText = matchOption ? matchOption.textContent : value;
                    this.input.value = this._selectedDisplayText;
                }
            }

            getValue() {
                return this.value;
            }

            reset() {
                this.value = '';
                this.input.value = '';
                this._selectedDisplayText = '';
            }

            updateOptions(options, defaultLabel) {
                const currentValue = this.value;
                const currentDisplayText = this._selectedDisplayText || '';
                this.dropdown.innerHTML = '';
                const allOption = document.createElement('div');
                allOption.className = 'combobox-option';
                allOption.dataset.value = '';
                allOption.textContent = defaultLabel || '全部';
                this.dropdown.appendChild(allOption);

                options.forEach(opt => {
                    const optionEl = document.createElement('div');
                    optionEl.className = 'combobox-option';
                    optionEl.dataset.value = opt.value;
                    optionEl.textContent = opt.label;
                    this.dropdown.appendChild(optionEl);
                });

                this.dropdown.querySelectorAll('.combobox-option').forEach(el => {
                    el.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        this._selectOption(el);
                    });
                });

                if (currentValue && !options.some(o => o.value === currentValue)) {
                    this.value = '';
                    this.input.value = '';
                    this._selectedDisplayText = '';
                } else if (currentValue) {
                    this.value = currentValue;
                    this.input.value = currentDisplayText;
                } else {
                    this.input.value = '';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (savedTheme === 'dark') {
                themeIcon.textContent = '☀️';
                themeText.textContent = '浅色模式';
            }

            document.querySelectorAll('.combobox').forEach(el => {
                const instance = new Combobox(el);
                comboboxInstances[instance.filterName] = instance;
            });

            const searchFilter = document.getElementById('search-filter');
            if (searchFilter) {
                searchFilter.addEventListener('input', debounce(applyFilters, 300));
            }

            initColumnResize();
            fetchRecords();
        });

        function processMessage(message) {
            if (!message) return '';
            return message.split('\n').filter(line => line.trim() !== '').join('\n');
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => { clearTimeout(timeout); func(...args); };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function showBranchLoading() {
            const branchCb = comboboxInstances['branch'];
            if (branchCb) branchCb.setDisabled(true);
        }

        function hideBranchLoading() {
            const branchCb = comboboxInstances['branch'];
            if (branchCb) branchCb.setDisabled(false);
        }

        async function fetchRecords() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                let subpath = urlParams.get('subpath');
                if (!subpath) {
                    const pathSegments = window.location.pathname.split('/');
                    if (pathSegments.length > 2 && pathSegments[1] === 'cd-records') {
                        subpath = pathSegments[2];
                    }
                }
                let apiUrl = window.location.origin + '/api/cd-records';
                if (subpath) apiUrl += `?subpath=${encodeURIComponent(subpath)}`;
                showBranchLoading();
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin'
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP error! status: ${response.status}, message: ${errorText}`);
                }
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const errorText = await response.text();
                    throw new Error(`Expected JSON response, got ${contentType}`);
                }
                const data = await response.json();
                allRecords = Array.isArray(data.records) ? data.records : [];
                sortByTimeDesc();
                updateFilterOptions();
                applyFilters();
            } catch (error) {
                console.error('获取CD记录失败:', error);
                document.getElementById('records-body').innerHTML = `
                    <tr>
                        <td colspan="8" class="error">
                            <div>⚠️ 获取CD记录失败</div>
                            <div style="font-size: 12px; margin-top: 8px;">请刷新页面重试</div>
                        </td>
                    </tr>
                `;
            } finally {
                hideBranchLoading();
            }
        }

        function sortByTimeDesc() {
            allRecords.sort((a, b) => {
                const timeA = new Date(a.push_time || 0);
                const timeB = new Date(b.push_time || 0);
                return timeB - timeA;
            });
        }

        const statusMap = {
            'success': '✅ 成功',
            'failed': '❌ 失败',
            'pending': '⏳ 进行中',
            'unknown': '❓ 未知'
        };

        function updateFilterOptions() {
            const projectCb = comboboxInstances['project'];
            const branchCb = comboboxInstances['branch'];
            const statusCb = comboboxInstances['status'];
            const userCb = comboboxInstances['user'];
            const ipCb = comboboxInstances['ip'];

            const selectedProject = projectCb ? projectCb.getValue() : '';
            const selectedBranch = branchCb ? branchCb.getValue() : '';
            const selectedUser = userCb ? userCb.getValue() : '';
            const selectedIp = ipCb ? ipCb.getValue() : '';

            const projectNames = [...new Set(allRecords.map(r => r.project_name))].filter(n => n).sort((a, b) => a.localeCompare(b));

            let branchSourceRecords = allRecords;
            if (selectedProject) branchSourceRecords = allRecords.filter(r => r.project_name === selectedProject);
            const branches = [...new Set(branchSourceRecords.map(r => r.ref))].filter(b => b).sort((a, b) => a.localeCompare(b));

            let statusSourceRecords = allRecords;
            if (selectedProject) statusSourceRecords = statusSourceRecords.filter(r => r.project_name === selectedProject);
            if (selectedBranch) statusSourceRecords = statusSourceRecords.filter(r => r.ref === selectedBranch);
            if (selectedUser) statusSourceRecords = statusSourceRecords.filter(r => r.user_name === selectedUser);
            if (selectedIp) statusSourceRecords = statusSourceRecords.filter(r => Array.isArray(r.deploy_ips) && r.deploy_ips.includes(selectedIp));
            const statuses = [...new Set(statusSourceRecords.map(r => r.pipeline_status || 'unknown'))].filter(s => s);

            let userSourceRecords = allRecords;
            if (selectedProject) userSourceRecords = userSourceRecords.filter(r => r.project_name === selectedProject);
            if (selectedBranch) userSourceRecords = userSourceRecords.filter(r => r.ref === selectedBranch);
            const userNames = [...new Set(userSourceRecords.map(r => r.user_name))].filter(n => n).sort((a, b) => a.localeCompare(b));

            let ipSourceRecords = allRecords;
            if (selectedProject) ipSourceRecords = ipSourceRecords.filter(r => r.project_name === selectedProject);
            if (selectedBranch) ipSourceRecords = ipSourceRecords.filter(r => r.ref === selectedBranch);
            if (selectedUser) ipSourceRecords = ipSourceRecords.filter(r => r.user_name === selectedUser);
            const allIps = new Set();
            ipSourceRecords.forEach(r => {
                if (Array.isArray(r.deploy_ips)) r.deploy_ips.forEach(ip => { if (ip) allIps.add(ip); });
            });
            const deployIps = [...allIps].sort((a, b) => a.localeCompare(b));

            if (projectCb) projectCb.updateOptions(projectNames.map(n => ({ value: n, label: n })), '📁 全部项目');
            if (branchCb) branchCb.updateOptions(branches.map(b => ({ value: b, label: b })), '🌿 全部分支');
            if (statusCb) statusCb.updateOptions(statuses.map(s => ({ value: s, label: statusMap[s] || s })), '📊 全部状态');
            if (userCb) userCb.updateOptions(userNames.map(n => ({ value: n, label: n })), '👤 全部人员');
            if (ipCb) ipCb.updateOptions(deployIps.map(ip => ({ value: ip, label: ip })), '🌐 全部IP');
        }

        function applyFilters() {
            const projectCb = comboboxInstances['project'];
            const branchCb = comboboxInstances['branch'];
            const statusCb = comboboxInstances['status'];
            const userCb = comboboxInstances['user'];
            const ipCb = comboboxInstances['ip'];

            const projectFilter = projectCb ? projectCb.getValue() : '';
            const branchFilter = branchCb ? branchCb.getValue() : '';
            const statusFilter = statusCb ? statusCb.getValue() : '';
            const userFilter = userCb ? userCb.getValue() : '';
            const ipFilter = ipCb ? ipCb.getValue() : '';
            const searchFilter = document.getElementById('search-filter').value.toLowerCase().trim();

            showBranchLoading();

            filteredRecords = allRecords.filter(record => {
                if (typeof record !== 'object' || record === null) return false;
                const projectName = record.project_name || '';
                const matchesProject = !projectFilter || projectName === projectFilter;
                const ref = record.ref || '';
                const matchesBranch = !branchFilter || ref === branchFilter;
                const pipelineStatus = record.pipeline_status || '';
                const matchesStatus = !statusFilter || pipelineStatus === statusFilter;
                const userName = record.user_name || '';
                const matchesUser = !userFilter || userName === userFilter;
                const deployIps = Array.isArray(record.deploy_ips) ? record.deploy_ips : [];
                const matchesIp = !ipFilter || deployIps.includes(ipFilter);
                let matchesSearch = true;
                if (searchFilter) {
                    const projectNameLower = projectName.toLowerCase();
                    const refLower = ref.toLowerCase();
                    const userNameLower = userName.toLowerCase();
                    const pipelineId = (record.pipeline_iid || '').toString();
                    const pushTime = (record.push_time || '').toLowerCase();
                    const message = (record.message || '').toLowerCase();
                    const subpath = (record.subpath || '').toLowerCase();
                    const deployIpsLower = deployIps.map(ip => (ip || '').toLowerCase());
                    matchesSearch = projectNameLower.includes(searchFilter) ||
                                  refLower.includes(searchFilter) ||
                                  userNameLower.includes(searchFilter) ||
                                  pipelineId.includes(searchFilter) ||
                                  pushTime.includes(searchFilter) ||
                                  subpath.includes(searchFilter) ||
                                  message.includes(searchFilter) ||
                                  deployIpsLower.some(ip => ip.includes(searchFilter));
                }
                return matchesProject && matchesBranch && matchesStatus && matchesUser && matchesIp && matchesSearch;
            });

            updateFilterOptions();
            sortTable(currentSortColumn, currentSortDirection);
            hideBranchLoading();
        }

        function sortTable(columnIndex, direction = null) {
            if (direction === null) {
                if (currentSortColumn === columnIndex) {
                    currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSortDirection = 'asc';
                }
                currentSortColumn = columnIndex;
            } else {
                currentSortDirection = direction;
            }
            updateSortIndicators(columnIndex);
            filteredRecords.sort((a, b) => {
                if (typeof a !== 'object' || a === null) return 1;
                if (typeof b !== 'object' || b === null) return -1;
                let aVal, bVal;
                switch (columnIndex) {
                    case 0: aVal = (a.project_name || '').toLowerCase(); bVal = (b.project_name || '').toLowerCase(); break;
                    case 1: aVal = (a.ref || '').toLowerCase(); bVal = (b.ref || '').toLowerCase(); break;
                    case 2: aVal = (a.user_name || '').toLowerCase(); bVal = (b.user_name || '').toLowerCase(); break;
                    case 3: aVal = parseInt(a.pipeline_iid) || 0; bVal = parseInt(b.pipeline_iid) || 0; break;
                    case 4: aVal = new Date(a.push_time || 0); bVal = new Date(b.push_time || 0); break;
                    case 5: aVal = (a.pipeline_status || '').toLowerCase(); bVal = (b.pipeline_status || '').toLowerCase(); break;
                    case 7: aVal = (a.message || '').toLowerCase(); bVal = (b.message || '').toLowerCase(); break;
                    default: return 0;
                }
                if (aVal.getTime && isNaN(aVal.getTime())) aVal = '';
                if (bVal.getTime && isNaN(bVal.getTime())) bVal = '';
                if (aVal < bVal) return currentSortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return currentSortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            currentPage = 1;
            renderTable();
        }

        function updateSortIndicators(sortedColumnIndex) {
            const headers = document.querySelectorAll('.records-table th');
            headers.forEach((header, index) => {
                const indicator = header.querySelector('.sort-indicator');
                if (indicator) {
                    if (index === sortedColumnIndex) {
                        indicator.textContent = currentSortDirection === 'asc' ? '▲' : '▼';
                    } else {
                        indicator.textContent = '';
                    }
                }
            });
        }

        function renderTable() {
            const tableBody = document.getElementById('records-body');
            const totalPages = Math.ceil(filteredRecords.length / recordsPerPage);
            const startIndex = (currentPage - 1) * recordsPerPage;
            const endIndex = startIndex + recordsPerPage;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);

            const totalRecordsEl = document.getElementById('total-records');
            if (filteredRecords.length === 0) {
                totalRecordsEl.innerHTML = '<span style="color: var(--text-tertiary);">无匹配数据</span>';
            } else {
                const successCount = filteredRecords.filter(r => r.pipeline_status === 'success').length;
                const failedCount = filteredRecords.filter(r => r.pipeline_status === 'failed').length;
                totalRecordsEl.innerHTML = `共 <strong>${filteredRecords.length}</strong> 条记录` +
                    (successCount > 0 ? ` <span class="status-badge status-success" style="font-size:0.7rem;margin-left:6px;">成功 ${successCount}</span>` : '') +
                    (failedCount > 0 ? ` <span class="status-badge status-failed" style="font-size:0.7rem;margin-left:4px;">失败 ${failedCount}</span>` : '');
            }

            tableBody.innerHTML = '';

            if (pageRecords.length === 0) {
                const projectCb = comboboxInstances['project'];
                const branchCb = comboboxInstances['branch'];
                const statusCb = comboboxInstances['status'];
                const userCb = comboboxInstances['user'];
                const ipCb = comboboxInstances['ip'];
                const activeFilters = [];
                if (projectCb && projectCb.getValue()) activeFilters.push(`项目: ${projectCb.getValue()}`);
                if (branchCb && branchCb.getValue()) activeFilters.push(`分支: ${branchCb.getValue()}`);
                if (statusCb && statusCb.getValue()) activeFilters.push(`状态: ${getStatusText(statusCb.getValue())}`);
                if (userCb && userCb.getValue()) activeFilters.push(`人员: ${userCb.getValue()}`);
                if (ipCb && ipCb.getValue()) activeFilters.push(`IP: ${ipCb.getValue()}`);
                const searchFilter = document.getElementById('search-filter').value;
                if (searchFilter) activeFilters.push(`搜索: "${searchFilter}"`);
                let filterInfo = '';
                if (activeFilters.length > 0) {
                    filterInfo = `<div style="font-size: 13px; margin-top: 12px; color: var(--text-secondary);">当前筛选条件: ${activeFilters.join(' | ')}</div>`;
                }
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="8" class="no-record" style="padding: 48px 24px;">
                            <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                            <div style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">暂无匹配记录</div>
                            <div style="font-size: 14px; color: var(--text-secondary);">当前筛选条件下没有找到任何数据</div>
                            ${filterInfo}
                            <button onclick="resetFilters()" class="filter-btn" style="margin-top: 20px;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                                清除所有筛选
                            </button>
                        </td>
                    </tr>
                `;
            } else {
                pageRecords.forEach((record, index) => {
                    if (typeof record !== 'object' || record === null) return;
                    const row = tableBody.insertRow();
                    row.style.animation = `slideUp 0.3s ease-out ${index * 0.05}s backwards`;

                    const projectCell = row.insertCell();
                    projectCell.textContent = record.project_name || '';

                    const branchCell = row.insertCell();
                    branchCell.textContent = record.ref || '';

                    const userCell = row.insertCell();
                    userCell.textContent = record.user_name || '';

                    const pipelineCell = row.insertCell();
                    pipelineCell.textContent = record.pipeline_iid || '';

                    const timeCell = row.insertCell();
                    const pushTime = record.push_time;
                    if (pushTime) {
                        try {
                            const date = new Date(pushTime);
                            timeCell.textContent = !isNaN(date.getTime()) ? date.toLocaleString('zh-CN') : pushTime;
                        } catch (e) { timeCell.textContent = pushTime; }
                    } else { timeCell.textContent = ''; }

                    const statusCell = row.insertCell();
                    const statusSpan = document.createElement('span');
                    const pipelineStatus = record.pipeline_status || 'unknown';
                    statusSpan.className = `status-badge status-${pipelineStatus}`;
                    statusSpan.textContent = getStatusText(pipelineStatus);
                    if (pipelineStatus === 'failed') {
                        statusSpan.style.cursor = 'pointer';
                        statusSpan.onclick = () => openLogDetailModal(record);
                    }
                    statusCell.appendChild(statusSpan);

                    const ipCell = row.insertCell();
                    const ipList = document.createElement('div');
                    ipList.className = 'deploy-ip-list';
                    const deployIps = Array.isArray(record.deploy_ips) ? record.deploy_ips : [];
                    deployIps.forEach(ip => {
                        if (ip) {
                            const ipSpan = document.createElement('span');
                            ipSpan.className = 'deploy-ip';
                            ipSpan.textContent = ip;
                            ipList.appendChild(ipSpan);
                        }
                    });
                    ipCell.appendChild(ipList);

                    const messageCell = row.insertCell();
                    const processedMessage = processMessage(record.message || '');
                    const messageWrapper = document.createElement('div');
                    messageWrapper.textContent = processedMessage;
                    messageWrapper.className = 'message-content';
                    if (processedMessage.length > 50 || processedMessage.includes('\n')) {
                        messageWrapper.addEventListener('mouseenter', function(e) { showTooltip(e, processedMessage); });
                        messageWrapper.addEventListener('mouseleave', hideTooltip);
                        messageWrapper.addEventListener('mousemove', moveTooltip);
                    }
                    messageCell.appendChild(messageWrapper);
                });
            }
            renderPagination();
        }

        function getStatusText(status) {
            const map = { 'success': '成功', 'failed': '失败', 'pending': '进行中', 'unknown': '未知' };
            return map[status] || status;
        }

        function showTooltip(e, text) {
            const tooltip = document.getElementById('customTooltip');
            tooltip.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
            tooltip.classList.add('show');
            moveTooltip(e);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function hideTooltip() {
            document.getElementById('customTooltip').classList.remove('show');
        }

        function moveTooltip(e) {
            const tooltip = document.getElementById('customTooltip');
            const tooltipRect = tooltip.getBoundingClientRect();
            const tooltipWidth = tooltipRect.width;
            const tooltipHeight = tooltipRect.height;
            let left = e.clientX - tooltipWidth / 2;
            let top = e.clientY - tooltipHeight - 15;
            const padding = 10;
            if (left < padding) left = padding;
            if (left + tooltipWidth > window.innerWidth - padding) left = window.innerWidth - tooltipWidth - padding;
            if (top < padding) top = e.clientY + 15;
            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        function resetFilters() {
            Object.values(comboboxInstances).forEach(cb => cb.reset());
            document.getElementById('search-filter').value = '';
            showBranchLoading();
            filteredRecords = [...allRecords];
            sortTable(currentSortColumn, currentSortDirection);
            hideBranchLoading();
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredRecords.length / recordsPerPage);
            pagination.innerHTML = '';
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '←';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderTable(); scrollToTable(); } };
            pagination.appendChild(prevBtn);

            const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.textContent = '1';
                firstBtn.onclick = () => { currentPage = 1; renderTable(); scrollToTable(); };
                pagination.appendChild(firstBtn);
                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '8px';
                    pagination.appendChild(ellipsis);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                pageBtn.className = i === currentPage ? 'active' : '';
                pageBtn.onclick = () => { currentPage = i; renderTable(); scrollToTable(); };
                pagination.appendChild(pageBtn);
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '8px';
                    pagination.appendChild(ellipsis);
                }
                const lastBtn = document.createElement('button');
                lastBtn.textContent = totalPages;
                lastBtn.onclick = () => { currentPage = totalPages; renderTable(); scrollToTable(); };
                pagination.appendChild(lastBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = '→';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderTable(); scrollToTable(); } };
            pagination.appendChild(nextBtn);
        }

        function scrollToTable() {
            const table = document.getElementById('records-table');
            if (table) table.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function initColumnResize() {
            const table = document.getElementById('records-table');
            const cols = table.querySelectorAll('colgroup col');
            const handles = table.querySelectorAll('.resize-handle');
            const STORAGE_KEY = 'cd-records-col-widths';

            const savedWidths = (() => {
                try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
            })();
            if (savedWidths && savedWidths.length === cols.length) {
                cols.forEach((col, i) => { col.style.width = savedWidths[i]; });
            }

            let isResizing = false;
            let currentCol = null;
            let startX = 0;
            let startWidth = 0;

            handles.forEach((handle, index) => {
                handle.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    isResizing = true;
                    currentCol = cols[index];
                    startX = e.pageX;
                    startWidth = currentCol.offsetWidth;
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    handle.classList.add('active');
                });
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing || !currentCol) return;
                const diff = e.pageX - startX;
                const newWidth = Math.max(60, startWidth + diff);
                currentCol.style.width = newWidth + 'px';
            });

            document.addEventListener('mouseup', () => {
                if (!isResizing) return;
                isResizing = false;
                currentCol = null;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                document.querySelectorAll('.resize-handle.active').forEach(h => h.classList.remove('active'));
                const widths = Array.from(cols).map(col => col.style.width);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(widths));
            });
        }

        let currentLogRecord = null;

        function openLogDetailModal(record) {
            currentLogRecord = record;
            const modal = document.getElementById('logDetailModal');
            const title = document.getElementById('logModalTitle');
            const logContent = document.getElementById('logPreContent');
            const errorSummary = document.getElementById('errorSummaryContent');
            const errorSection = document.getElementById('errorSummarySection');
            title.textContent = `📄 构建日志 - ${record.project_name}`;
            logContent.textContent = '加载中...';
            errorSummary.textContent = '';
            errorSection.style.display = 'none';
            modal.classList.add('show');
            fetchBuildLogs(record.project_name, record.pipeline_iid);
        }

        async function fetchBuildLogs(projectName, pipelineIid) {
            try {
                const response = await fetch(`/api/build-logs/${encodeURIComponent(projectName)}/${pipelineIid}`);
                const logContent = document.getElementById('logPreContent');
                const errorSummary = document.getElementById('errorSummaryContent');
                const errorSection = document.getElementById('errorSummarySection');
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'success' && data.data) {
                        logContent.textContent = data.data.full_log || '无日志内容';
                        if (data.data.error_summary) {
                            errorSummary.textContent = data.data.error_summary;
                            errorSection.style.display = 'block';
                        }
                    } else {
                        logContent.textContent = '日志不存在或加载失败';
                    }
                } else {
                    logContent.textContent = `加载失败: ${response.status}`;
                }
            } catch (error) {
                console.error('获取日志失败:', error);
                document.getElementById('logPreContent').textContent = '加载失败: ' + error.message;
            }
        }

        function closeLogDetailModal() {
            document.getElementById('logDetailModal').classList.remove('show');
            currentLogRecord = null;
        }

        function highlightLogSearch(event) {
            if (event && event.key !== 'Enter' && event.type === 'keyup') return;
            const searchInput = document.getElementById('logSearchInput');
            const logContent = document.getElementById('logPreContent');
            const searchTerm = searchInput.value.trim();
            logContent.innerHTML = logContent.textContent;
            if (searchTerm) {
                const regex = new RegExp(`(${searchTerm})`, 'gi');
                logContent.innerHTML = logContent.textContent.replace(regex, '<span class="log-highlight">$1</span>');
            }
        }

        function downloadLogFile() {
            if (!currentLogRecord) { alert('没有可下载的日志'); return; }
            window.open(`/api/build-logs/${encodeURIComponent(currentLogRecord.project_name)}/${currentLogRecord.pipeline_iid}/download`, '_blank');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('logDetailModal');
            if (event.target === modal) closeLogDetailModal();
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') closeLogDetailModal();
        });
    </script>
</body>
</html>
