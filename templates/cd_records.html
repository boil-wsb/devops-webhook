<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD 记录管理</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="cd-records-container">
        <!-- 页面头部 -->
        <header class="page-header">
            <h1>📊 CD 记录管理</h1>
            <div class="header-actions">
                <a href="{{ return_url }}" class="page-nav-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    返回项目清单
                </a>
                <button class="page-nav-btn" onclick="toggleTheme()" id="themeToggleBtn">
                    <span id="themeIcon">🌙</span>
                    <span id="themeText">深色模式</span>
                </button>
            </div>
        </header>

        <!-- 筛选区域 -->
        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-item">
                    <label for="project-filter">项目名称</label>
                    <select id="project-filter">
                        <option value="">全部项目</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="branch-filter">分支</label>
                    <div class="select-wrapper">
                        <select id="branch-filter" disabled>
                            <option value="">全部分支</option>
                        </select>
                        <div class="loading-overlay" id="branch-loading">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite; margin-right: 8px;">
                                <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                            </svg>
                            加载中...
                        </div>
                    </div>
                </div>
                <div class="filter-item">
                    <label for="status-filter">状态</label>
                    <select id="status-filter">
                        <option value="">全部状态</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="user-filter">提交人员</label>
                    <select id="user-filter">
                        <option value="">全部人员</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="ip-filter">部署IP</label>
                    <select id="ip-filter">
                        <option value="">全部IP</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="search-filter">搜索</label>
                    <input type="text" id="search-filter" placeholder="输入搜索内容...">
                </div>
                <div class="filter-item" style="flex-direction: row; align-items: flex-end; gap: 8px;">
                    <button class="filter-btn secondary" onclick="resetFilters()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                        重置
                    </button>
                </div>
            </div>
        </div>

        <!-- 记录列表 -->
        <div class="records-section">
            <div class="total-records" id="total-records"></div>
            <div style="overflow-x: auto;">
                <table class="records-table" id="records-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">
                                项目名称
                                <span class="sort-indicator">▲</span>
                            </th>
                            <th onclick="sortTable(1)">
                                分支
                                <span class="sort-indicator"></span>
                            </th>
                            <th onclick="sortTable(2)">
                                提交人员
                                <span class="sort-indicator"></span>
                            </th>
                            <th onclick="sortTable(3)">
                                流水线ID
                                <span class="sort-indicator"></span>
                            </th>
                            <th onclick="sortTable(4)">
                                推送时间
                                <span class="sort-indicator"></span>
                            </th>
                            <th onclick="sortTable(5)">
                                状态
                                <span class="sort-indicator"></span>
                            </th>
                            <th>部署IP</th>
                            <th onclick="sortTable(7)">
                                提交信息
                                <span class="sort-indicator"></span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                        <!-- 记录将通过JavaScript动态生成 -->
                        <tr>
                            <td colspan="8" class="loading">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite; margin-bottom: 8px;">
                                    <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                                </svg>
                                <div>加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- 自定义 Tooltip -->
    <div id="customTooltip" class="custom-tooltip"></div>

    <!-- 日志详情模态框 -->
    <div id="logDetailModal" class="modal">
        <div class="modal-content log-detail-modal">
            <div class="modal-header">
                <h2 id="logModalTitle">📄 构建日志</h2>
                <button class="close" onclick="closeLogDetailModal()">&times;</button>
            </div>
            <div class="log-toolbar">
                <input type="text" id="logSearchInput" placeholder="搜索关键字..." onkeyup="highlightLogSearch(event)">
                <button onclick="highlightLogSearch()">搜索</button>
                <button onclick="downloadLogFile()">下载日志</button>
            </div>
            <div class="log-content" id="logContent">
                <pre id="logPreContent"></pre>
            </div>
            <div class="error-summary" id="errorSummarySection">
                <h3>🔍 错误摘要</h3>
                <pre id="errorSummaryContent"></pre>
            </div>
        </div>
    </div>

    <script>
        // 主题切换功能
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            // 更新按钮文本和图标
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');

            if (newTheme === 'dark') {
                themeIcon.textContent = '☀️';
                themeText.textContent = '浅色模式';
            } else {
                themeIcon.textContent = '🌙';
                themeText.textContent = '深色模式';
            }
        }

        // 全局变量
        let allRecords = [];
        let filteredRecords = [];
        let currentPage = 1;
        let recordsPerPage = 10;
        let currentSortColumn = 4; // 默认按推送时间排序
        let currentSortDirection = 'desc'; // 默认降序

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化主题
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (savedTheme === 'dark') {
                themeIcon.textContent = '☀️';
                themeText.textContent = '浅色模式';
            }

            // 为筛选项添加change事件监听器
            const projectFilter = document.getElementById('project-filter');
            if (projectFilter) {
                projectFilter.addEventListener('change', function() {
                    applyFilters();
                });
            }

            const branchFilter = document.getElementById('branch-filter');
            if (branchFilter) {
                branchFilter.addEventListener('change', function() {
                    applyFilters();
                });
            }

            const statusFilter = document.getElementById('status-filter');
            if (statusFilter) {
                statusFilter.addEventListener('change', function() {
                    applyFilters();
                });
            }

            const userFilter = document.getElementById('user-filter');
            if (userFilter) {
                userFilter.addEventListener('change', function() {
                    applyFilters();
                });
            }

            const ipFilter = document.getElementById('ip-filter');
            if (ipFilter) {
                ipFilter.addEventListener('change', function() {
                    applyFilters();
                });
            }

            // 添加搜索框防抖
            const searchFilter = document.getElementById('search-filter');
            if (searchFilter) {
                searchFilter.addEventListener('input', debounce(applyFilters, 300));
            }

            fetchRecords();
        });

        // 处理提交信息：过滤空行但保留换行符
        function processMessage(message) {
            if (!message) return '';

            // 按行分割，过滤空行（包括只有空格的行），然后重新连接
            return message
                .split('\n')
                .filter(line => line.trim() !== '')
                .join('\n');
        }

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 显示分支加载状态
        function showBranchLoading() {
            const loadingOverlay = document.getElementById('branch-loading');
            const branchFilter = document.getElementById('branch-filter');
            if (loadingOverlay) {
                loadingOverlay.classList.add('show');
            }
            if (branchFilter) {
                branchFilter.disabled = true;
            }
        }

        // 隐藏分支加载状态
        function hideBranchLoading() {
            const loadingOverlay = document.getElementById('branch-loading');
            const branchFilter = document.getElementById('branch-filter');
            if (loadingOverlay) {
                loadingOverlay.classList.remove('show');
            }
            if (branchFilter) {
                branchFilter.disabled = false;
            }
        }

        // 从API获取记录
        async function fetchRecords() {
            try {
                // 从URL中获取subpath参数：优先从查询参数获取，其次从路径获取
                const urlParams = new URLSearchParams(window.location.search);
                let subpath = urlParams.get('subpath');

                // 如果查询参数中没有subpath，则从URL路径中提取
                if (!subpath) {
                    const pathSegments = window.location.pathname.split('/');
                    // 路径格式：/cd-records/PD3 或 /cd-records/PD3/xxx
                    if (pathSegments.length > 2 && pathSegments[1] === 'cd-records') {
                        subpath = pathSegments[2];
                    }
                }

                // 构建API URL，包含subpath参数
                let apiUrl = window.location.origin + '/api/cd-records';
                if (subpath) {
                    apiUrl += `?subpath=${encodeURIComponent(subpath)}`;
                }

                // 显示分支加载状态
                showBranchLoading();

                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    // 获取响应文本，查看详细错误信息
                    const errorText = await response.text();
                    throw new Error(`HTTP error! status: ${response.status}, message: ${errorText}`);
                }

                // 检查响应类型
                const contentType = response.headers.get('content-type');

                if (!contentType || !contentType.includes('application/json')) {
                    const errorText = await response.text();
                    throw new Error(`Expected JSON response, got ${contentType}`);
                }

                const data = await response.json();

                // 确保data.records是数组
                allRecords = Array.isArray(data.records) ? data.records : [];

                // 初始化时按时间从晚到早排序
                sortByTimeDesc();

                // 初始化筛选选项
                updateFilterOptions();

                // 调用筛选函数，渲染表格
                applyFilters();
            } catch (error) {
                console.error('获取CD记录失败:', error);
                document.getElementById('records-body').innerHTML = `
                    <tr>
                        <td colspan="8" class="error">
                            <div>⚠️ 获取CD记录失败</div>
                            <div style="font-size: 12px; margin-top: 8px;">请刷新页面重试</div>
                        </td>
                    </tr>
                `;
            } finally {
                // 隐藏分支加载状态
                hideBranchLoading();
            }
        }

        // 按时间从晚到早排序
        function sortByTimeDesc() {
            allRecords.sort((a, b) => {
                const timeA = new Date(a.push_time || 0);
                const timeB = new Date(b.push_time || 0);
                // 从晚到早排序
                return timeB - timeA;
            });
        }

        // 状态映射（用于显示）
        const statusMap = {
            'success': '✅ 成功',
            'failed': '❌ 失败',
            'pending': '⏳ 进行中',
            'unknown': '❓ 未知'
        };

        // 更新筛选选项（带联动效果）
        function updateFilterOptions() {
            // 获取当前已选择的筛选值
            const selectedProject = document.getElementById('project-filter').value;
            const selectedBranch = document.getElementById('branch-filter').value;
            const selectedUser = document.getElementById('user-filter').value;
            const selectedIp = document.getElementById('ip-filter').value;

            // 项目名称选项：始终显示所有项目（不受其他筛选影响）
            const projectNames = [...new Set(allRecords.map(record => record.project_name))].filter(name => name);

            // 分支选项：如果选择了项目，只显示该项目的分支
            let branchSourceRecords = allRecords;
            if (selectedProject) {
                branchSourceRecords = allRecords.filter(r => r.project_name === selectedProject);
            }
            const branches = [...new Set(branchSourceRecords.map(record => record.ref))].filter(branch => branch);

            // 状态选项：根据已选的项目、分支、人员，只显示对应的状态
            let statusSourceRecords = allRecords;
            if (selectedProject) {
                statusSourceRecords = statusSourceRecords.filter(r => r.project_name === selectedProject);
            }
            if (selectedBranch) {
                statusSourceRecords = statusSourceRecords.filter(r => r.ref === selectedBranch);
            }
            if (selectedUser) {
                statusSourceRecords = statusSourceRecords.filter(r => r.user_name === selectedUser);
            }
            if (selectedIp) {
                statusSourceRecords = statusSourceRecords.filter(r => {
                    return Array.isArray(r.deploy_ips) && r.deploy_ips.includes(selectedIp);
                });
            }
            const statuses = [...new Set(statusSourceRecords.map(record => record.pipeline_status || 'unknown'))].filter(s => s);

            // 提交人员选项：如果选择了项目、分支或状态，只显示对应的人员
            let userSourceRecords = allRecords;
            if (selectedProject) {
                userSourceRecords = userSourceRecords.filter(r => r.project_name === selectedProject);
            }
            if (selectedBranch) {
                userSourceRecords = userSourceRecords.filter(r => r.ref === selectedBranch);
            }
            // 注意：状态不用于过滤人员选项，因为状态通常是最后选择的
            const userNames = [...new Set(userSourceRecords.map(record => record.user_name))].filter(name => name);

            // 部署IP选项：如果选择了项目、分支、人员或状态，只显示对应的IP
            let ipSourceRecords = allRecords;
            if (selectedProject) {
                ipSourceRecords = ipSourceRecords.filter(r => r.project_name === selectedProject);
            }
            if (selectedBranch) {
                ipSourceRecords = ipSourceRecords.filter(r => r.ref === selectedBranch);
            }
            if (selectedUser) {
                ipSourceRecords = ipSourceRecords.filter(r => r.user_name === selectedUser);
            }
            const allIps = new Set();
            ipSourceRecords.forEach(record => {
                if (Array.isArray(record.deploy_ips)) {
                    record.deploy_ips.forEach(ip => {
                        if (ip) allIps.add(ip);
                    });
                }
            });
            const deployIps = [...allIps];

            // 对所有选项按字母顺序排序
            projectNames.sort((a, b) => a.localeCompare(b));
            branches.sort((a, b) => a.localeCompare(b));
            userNames.sort((a, b) => a.localeCompare(b));
            deployIps.sort((a, b) => a.localeCompare(b));

            // 更新项目名称下拉选项
            const projectSelect = document.getElementById('project-filter');
            if (projectSelect) {
                const currentValue = projectSelect.value;
                projectSelect.innerHTML = '<option value="">📁 全部项目</option>';
                projectNames.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    projectSelect.appendChild(option);
                });
                projectSelect.value = currentValue;
            }

            // 更新分支下拉选项
            const branchSelect = document.getElementById('branch-filter');
            if (branchSelect) {
                const currentValue = branchSelect.value;
                branchSelect.innerHTML = '<option value="">🌿 全部分支</option>';
                branches.forEach(branch => {
                    const option = document.createElement('option');
                    option.value = branch;
                    option.textContent = branch;
                    branchSelect.appendChild(option);
                });
                // 如果当前值不在新选项中，重置为空
                if (currentValue && !branches.includes(currentValue)) {
                    branchSelect.value = '';
                } else {
                    branchSelect.value = currentValue;
                }
            }

            // 更新状态下拉选项
            const statusSelect = document.getElementById('status-filter');
            if (statusSelect) {
                const currentValue = statusSelect.value;
                statusSelect.innerHTML = '<option value="">📊 全部状态</option>';
                statuses.forEach(status => {
                    const option = document.createElement('option');
                    option.value = status;
                    option.textContent = statusMap[status] || status;
                    statusSelect.appendChild(option);
                });
                // 如果当前值不在新选项中，重置为空
                if (currentValue && !statuses.includes(currentValue)) {
                    statusSelect.value = '';
                } else {
                    statusSelect.value = currentValue;
                }
            }

            // 更新提交人员下拉选项
            const userSelect = document.getElementById('user-filter');
            if (userSelect) {
                const currentValue = userSelect.value;
                userSelect.innerHTML = '<option value="">👤 全部人员</option>';
                userNames.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    userSelect.appendChild(option);
                });
                // 如果当前值不在新选项中，重置为空
                if (currentValue && !userNames.includes(currentValue)) {
                    userSelect.value = '';
                } else {
                    userSelect.value = currentValue;
                }
            }

            // 更新部署IP下拉选项
            const ipSelect = document.getElementById('ip-filter');
            if (ipSelect) {
                const currentValue = ipSelect.value;
                ipSelect.innerHTML = '<option value="">🌐 全部IP</option>';
                deployIps.forEach(ip => {
                    const option = document.createElement('option');
                    option.value = ip;
                    option.textContent = ip;
                    ipSelect.appendChild(option);
                });
                // 如果当前值不在新选项中，重置为空
                if (currentValue && !deployIps.includes(currentValue)) {
                    ipSelect.value = '';
                } else {
                    ipSelect.value = currentValue;
                }
            }
        }

        // 应用筛选条件
        function applyFilters() {
            const projectFilter = document.getElementById('project-filter').value;
            const branchFilter = document.getElementById('branch-filter').value;
            const statusFilter = document.getElementById('status-filter').value;
            const userFilter = document.getElementById('user-filter').value;
            const ipFilter = document.getElementById('ip-filter').value;
            const searchFilter = document.getElementById('search-filter').value.toLowerCase().trim();

            // 显示分支加载状态
            showBranchLoading();

            filteredRecords = allRecords.filter(record => {
                // 确保record是对象
                if (typeof record !== 'object' || record === null) {
                    return false;
                }

                // 项目名称筛选（下拉选择框，精确匹配）
                const projectName = record.project_name || '';
                const matchesProject = !projectFilter || projectName === projectFilter;

                // 分支筛选（下拉选择框，精确匹配）
                const ref = record.ref || '';
                const matchesBranch = !branchFilter || ref === branchFilter;

                // 状态筛选
                const pipelineStatus = record.pipeline_status || '';
                const matchesStatus = !statusFilter || pipelineStatus === statusFilter;

                // 提交人员筛选
                const userName = record.user_name || '';
                const matchesUser = !userFilter || userName === userFilter;

                // 部署IP筛选
                const deployIps = Array.isArray(record.deploy_ips) ? record.deploy_ips : [];
                const matchesIp = !ipFilter || deployIps.includes(ipFilter);

                // 全局搜索功能
                let matchesSearch = true;
                if (searchFilter) {
                    // 搜索所有字段
                    const searchText = searchFilter;
                    const projectNameLower = projectName.toLowerCase();
                    const refLower = ref.toLowerCase();
                    const userName = (record.user_name || '').toLowerCase();
                    const pipelineId = (record.pipeline_iid || '').toString();
                    const pushTime = (record.push_time || '').toLowerCase();
                    const message = (record.message || '').toLowerCase();
                    const subpath = (record.subpath || '').toLowerCase();
                    const deployIps = Array.isArray(record.deploy_ips) ? record.deploy_ips : [];
                    const deployIpsLower = deployIps.map(ip => (ip || '').toLowerCase());

                    matchesSearch = projectNameLower.includes(searchText) ||
                                  refLower.includes(searchText) ||
                                  userName.includes(searchText) ||
                                  pipelineId.includes(searchText) ||
                                  pushTime.includes(searchText) ||
                                  subpath.includes(searchText) ||
                                  message.includes(searchText) ||
                                  deployIpsLower.some(ip => ip.includes(searchText));
                }

                return matchesProject && matchesBranch && matchesStatus && matchesUser && matchesIp && matchesSearch;
            });

            // 更新筛选选项（实现联动效果）
            updateFilterOptions();

            // 调用排序函数
            sortTable(currentSortColumn, currentSortDirection);

            // 隐藏分支加载状态
            hideBranchLoading();
        }

        // 排序表格
        function sortTable(columnIndex, direction = null) {
            // 设置排序方向
            if (direction === null) {
                if (currentSortColumn === columnIndex) {
                    currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSortDirection = 'asc';
                }
                currentSortColumn = columnIndex;
            } else {
                currentSortDirection = direction;
            }

            // 更新排序指示器
            updateSortIndicators(columnIndex);

            // 排序记录
            filteredRecords.sort((a, b) => {
                // 确保a和b是对象
                if (typeof a !== 'object' || a === null) return 1;
                if (typeof b !== 'object' || b === null) return -1;

                let aVal, bVal;

                switch (columnIndex) {
                    case 0: // 项目名称
                        aVal = (a.project_name || '').toLowerCase();
                        bVal = (b.project_name || '').toLowerCase();
                        break;
                    case 1: // 分支
                        aVal = (a.ref || '').toLowerCase();
                        bVal = (b.ref || '').toLowerCase();
                        break;
                    case 2: // 提交人员
                        aVal = (a.user_name || '').toLowerCase();
                        bVal = (b.user_name || '').toLowerCase();
                        break;
                    case 3: // 流水线ID
                        aVal = parseInt(a.pipeline_iid) || 0;
                        bVal = parseInt(b.pipeline_iid) || 0;
                        break;
                    case 4: // 推送时间
                        aVal = new Date(a.push_time || 0);
                        bVal = new Date(b.push_time || 0);
                        break;
                    case 5: // 状态
                        aVal = (a.pipeline_status || '').toLowerCase();
                        bVal = (b.pipeline_status || '').toLowerCase();
                        break;
                    case 7: // 提交信息
                        aVal = (a.message || '').toLowerCase();
                        bVal = (b.message || '').toLowerCase();
                        break;
                    default:
                        return 0;
                }

                // 处理日期对象无效的情况
                if (aVal.getTime && isNaN(aVal.getTime())) {
                    aVal = '';
                }
                if (bVal.getTime && isNaN(bVal.getTime())) {
                    bVal = '';
                }

                if (aVal < bVal) return currentSortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return currentSortDirection === 'asc' ? 1 : -1;
                return 0;
            });

            currentPage = 1;
            renderTable();
        }

        // 更新排序指示器
        function updateSortIndicators(sortedColumnIndex) {
            const headers = document.querySelectorAll('.records-table th');
            headers.forEach((header, index) => {
                const indicator = header.querySelector('.sort-indicator');
                // 检查indicator是否存在，避免TypeError
                if (indicator) {
                    if (index === sortedColumnIndex) {
                        indicator.textContent = currentSortDirection === 'asc' ? '▲' : '▼';
                    } else {
                        indicator.textContent = '';
                    }
                }
            });
        }

        // 渲染表格
        function renderTable() {
            const tableBody = document.getElementById('records-body');
            const totalPages = Math.ceil(filteredRecords.length / recordsPerPage);
            const startIndex = (currentPage - 1) * recordsPerPage;
            const endIndex = startIndex + recordsPerPage;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);

            // 更新总记录数显示
            const totalRecordsEl = document.getElementById('total-records');
            if (filteredRecords.length === 0) {
                totalRecordsEl.innerHTML = '<span style="color: var(--text-tertiary);">无匹配数据</span>';
            } else {
                totalRecordsEl.textContent = `共 ${filteredRecords.length} 条记录`;
            }

            // 清空表格
            tableBody.innerHTML = '';

            // 渲染记录
            if (pageRecords.length === 0) {
                // 获取当前筛选条件用于显示
                const activeFilters = [];
                const projectFilter = document.getElementById('project-filter').value;
                const branchFilter = document.getElementById('branch-filter').value;
                const statusFilter = document.getElementById('status-filter').value;
                const userFilter = document.getElementById('user-filter').value;
                const ipFilter = document.getElementById('ip-filter').value;
                const searchFilter = document.getElementById('search-filter').value;

                if (projectFilter) activeFilters.push(`项目: ${projectFilter}`);
                if (branchFilter) activeFilters.push(`分支: ${branchFilter}`);
                if (statusFilter) activeFilters.push(`状态: ${getStatusText(statusFilter)}`);
                if (userFilter) activeFilters.push(`人员: ${userFilter}`);
                if (ipFilter) activeFilters.push(`IP: ${ipFilter}`);
                if (searchFilter) activeFilters.push(`搜索: "${searchFilter}"`);

                let filterInfo = '';
                if (activeFilters.length > 0) {
                    filterInfo = `<div style="font-size: 13px; margin-top: 12px; color: var(--text-secondary);">当前筛选条件: ${activeFilters.join(' | ')}</div>`;
                }

                tableBody.innerHTML = `
                    <tr>
                        <td colspan="8" class="no-record" style="padding: 48px 24px;">
                            <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                            <div style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">暂无匹配记录</div>
                            <div style="font-size: 14px; color: var(--text-secondary);">当前筛选条件下没有找到任何数据</div>
                            ${filterInfo}
                            <button onclick="resetFilters()" class="filter-btn" style="margin-top: 20px;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                                清除所有筛选
                            </button>
                        </td>
                    </tr>
                `;
            } else {
                pageRecords.forEach((record, index) => {
                    // 确保record是对象
                    if (typeof record !== 'object' || record === null) {
                        return;
                    }

                    const row = tableBody.insertRow();
                    row.style.animation = `slideUp 0.3s ease-out ${index * 0.05}s backwards`;

                    // 项目名称
                    const projectCell = row.insertCell();
                    projectCell.textContent = record.project_name || '';

                    // 分支
                    const branchCell = row.insertCell();
                    branchCell.textContent = record.ref || '';

                    // 提交人员
                    const userCell = row.insertCell();
                    userCell.textContent = record.user_name || '';

                    // 流水线ID
                    const pipelineCell = row.insertCell();
                    pipelineCell.textContent = record.pipeline_iid || '';

                    // 推送时间
                    const timeCell = row.insertCell();
                    const pushTime = record.push_time;
                    if (pushTime) {
                        try {
                            const date = new Date(pushTime);
                            if (!isNaN(date.getTime())) {
                                timeCell.textContent = date.toLocaleString('zh-CN');
                            } else {
                                timeCell.textContent = pushTime;
                            }
                        } catch (error) {
                            timeCell.textContent = pushTime;
                        }
                    } else {
                        timeCell.textContent = '';
                    }

                    // 状态
                    const statusCell = row.insertCell();
                    const statusSpan = document.createElement('span');
                    const pipelineStatus = record.pipeline_status || 'unknown';
                    statusSpan.className = `status-badge status-${pipelineStatus}`;
                    statusSpan.textContent = getStatusText(pipelineStatus);
                    if (pipelineStatus === 'failed') {
                        statusSpan.style.cursor = 'pointer';
                        statusSpan.onclick = () => openLogDetailModal(record);
                    }
                    statusCell.appendChild(statusSpan);

                    // 部署IP
                    const ipCell = row.insertCell();
                    const ipList = document.createElement('div');
                    ipList.className = 'deploy-ip-list';

                    const deployIps = Array.isArray(record.deploy_ips) ? record.deploy_ips : [];
                    deployIps.forEach(ip => {
                        if (ip) {
                            const ipSpan = document.createElement('span');
                            ipSpan.className = 'deploy-ip';
                            ipSpan.textContent = ip;
                            ipList.appendChild(ipSpan);
                        }
                    });
                    ipCell.appendChild(ipList);

                    // 提交信息
                    const messageCell = row.insertCell();
                    const rawMessage = record.message || '';

                    // 处理提交信息：过滤空行但保留换行符
                    const processedMessage = processMessage(rawMessage);

                    // 创建一个包装div，用于实现多行截断
                    const messageWrapper = document.createElement('div');
                    messageWrapper.textContent = processedMessage;
                    messageWrapper.className = 'message-content';

                    // 添加tooltip事件（如果处理后的消息超过50字符或有换行）
                    if (processedMessage.length > 50 || processedMessage.includes('\n')) {
                        messageWrapper.addEventListener('mouseenter', function(e) {
                            showTooltip(e, processedMessage);
                        });
                        messageWrapper.addEventListener('mouseleave', hideTooltip);
                        messageWrapper.addEventListener('mousemove', moveTooltip);
                    }

                    messageCell.appendChild(messageWrapper);
                });
            }

            // 渲染分页
            renderPagination();
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'success': '成功',
                'failed': '失败',
                'pending': '进行中',
                'unknown': '未知'
            };
            return statusMap[status] || status;
        }

        // 显示Tooltip
        function showTooltip(e, text) {
            const tooltip = document.getElementById('customTooltip');
            // 使用 innerHTML 并保留换行符，将换行符转换为 <br> 标签
            tooltip.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
            tooltip.classList.add('show');
            moveTooltip(e);
        }

        // HTML 转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 隐藏Tooltip
        function hideTooltip() {
            const tooltip = document.getElementById('customTooltip');
            tooltip.classList.remove('show');
        }

        // 移动Tooltip
        function moveTooltip(e) {
            const tooltip = document.getElementById('customTooltip');
            const x = e.clientX;
            const y = e.clientY;

            // 先获取尺寸（此时tooltip已显示）
            const tooltipRect = tooltip.getBoundingClientRect();
            const tooltipWidth = tooltipRect.width;
            const tooltipHeight = tooltipRect.height;

            // 计算位置：水平居中，垂直在鼠标上方
            let left = x - tooltipWidth / 2;
            let top = y - tooltipHeight - 15;

            // 边界检查：确保不超出视口
            const padding = 10;
            if (left < padding) {
                left = padding;
            }
            if (left + tooltipWidth > window.innerWidth - padding) {
                left = window.innerWidth - tooltipWidth - padding;
            }
            if (top < padding) {
                // 如果上方空间不足，显示在鼠标下方
                top = y + 15;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        // 重置筛选条件
        function resetFilters() {
            document.getElementById('project-filter').value = '';
            document.getElementById('branch-filter').value = '';
            document.getElementById('status-filter').value = '';
            document.getElementById('user-filter').value = '';
            document.getElementById('ip-filter').value = '';
            document.getElementById('search-filter').value = '';

            // 显示分支加载状态
            showBranchLoading();

            // 重置为显示所有记录
            filteredRecords = [...allRecords];

            // 调用排序函数
            sortTable(currentSortColumn, currentSortDirection);

            // 隐藏分支加载状态
            hideBranchLoading();
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredRecords.length / recordsPerPage);

            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            // 上一页按钮
            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '←';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                    scrollToTable();
                }
            };
            pagination.appendChild(prevBtn);

            // 页码按钮
            const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            // 第一页
            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.textContent = '1';
                firstBtn.onclick = () => {
                    currentPage = 1;
                    renderTable();
                    scrollToTable();
                };
                pagination.appendChild(firstBtn);

                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '8px';
                    pagination.appendChild(ellipsis);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                pageBtn.className = i === currentPage ? 'active' : '';
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderTable();
                    scrollToTable();
                };
                pagination.appendChild(pageBtn);
            }

            // 最后一页
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '8px';
                    pagination.appendChild(ellipsis);
                }

                const lastBtn = document.createElement('button');
                lastBtn.textContent = totalPages;
                lastBtn.onclick = () => {
                    currentPage = totalPages;
                    renderTable();
                    scrollToTable();
                };
                pagination.appendChild(lastBtn);
            }

            // 下一页按钮
            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = '→';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                    scrollToTable();
                }
            };
            pagination.appendChild(nextBtn);
        }

        // 滚动到表格顶部
        function scrollToTable() {
            const table = document.getElementById('records-table');
            if (table) {
                table.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 日志详情模态框相关函数
        let currentLogRecord = null;

        function openLogDetailModal(record) {
            currentLogRecord = record;
            const modal = document.getElementById('logDetailModal');
            const title = document.getElementById('logModalTitle');
            const logContent = document.getElementById('logPreContent');
            const errorSummary = document.getElementById('errorSummaryContent');
            const errorSection = document.getElementById('errorSummarySection');

            title.textContent = `📄 构建日志 - ${record.project_name}`;
            logContent.textContent = '加载中...';
            errorSummary.textContent = '';
            errorSection.style.display = 'none';

            modal.classList.add('show');

            fetchBuildLogs(record.project_name, record.pipeline_iid);
        }

        async function fetchBuildLogs(projectName, pipelineIid) {
            try {
                const response = await fetch(`/api/build-logs/${encodeURIComponent(projectName)}/${pipelineIid}`);

                const logContent = document.getElementById('logPreContent');
                const errorSummary = document.getElementById('errorSummaryContent');
                const errorSection = document.getElementById('errorSummarySection');

                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'success' && data.data) {
                        logContent.textContent = data.data.full_log || '无日志内容';
                        if (data.data.error_summary) {
                            errorSummary.textContent = data.data.error_summary;
                            errorSection.style.display = 'block';
                        }
                    } else {
                        logContent.textContent = '日志不存在或加载失败';
                    }
                } else {
                    logContent.textContent = `加载失败: ${response.status}`;
                }
            } catch (error) {
                console.error('获取日志失败:', error);
                document.getElementById('logPreContent').textContent = '加载失败: ' + error.message;
            }
        }

        function closeLogDetailModal() {
            const modal = document.getElementById('logDetailModal');
            modal.classList.remove('show');
            currentLogRecord = null;
        }

        function highlightLogSearch(event) {
            if (event && event.key !== 'Enter' && event.type === 'keyup') {
                return;
            }

            const searchInput = document.getElementById('logSearchInput');
            const logContent = document.getElementById('logPreContent');
            const searchTerm = searchInput.value.trim();

            logContent.innerHTML = logContent.textContent;

            if (searchTerm) {
                const regex = new RegExp(`(${searchTerm})`, 'gi');
                logContent.innerHTML = logContent.textContent.replace(regex, '<span class="log-highlight">$1</span>');
            }
        }

        function downloadLogFile() {
            if (!currentLogRecord) {
                alert('没有可下载的日志');
                return;
            }

            const projectName = currentLogRecord.project_name;
            const pipelineIid = currentLogRecord.pipeline_iid;

            window.open(`/api/build-logs/${encodeURIComponent(projectName)}/${pipelineIid}/download`, '_blank');
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('logDetailModal');
            if (event.target === modal) {
                closeLogDetailModal();
            }
        }

        // ESC 键关闭模态框
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeLogDetailModal();
            }
        });
    </script>
</body>
</html>
