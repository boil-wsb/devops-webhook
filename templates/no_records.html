<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无记录 - 流水线管理系统</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="no-records-container">
        <!-- 页面头部 -->
        <header class="page-header">
            <h1>🚀 流水线管理系统</h1>
            <div class="header-actions">
                <a href="/pipelines/records/view" class="page-nav-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    返回首页
                </a>
                <button class="page-nav-btn" onclick="toggleTheme()" id="themeToggleBtn">
                    <span id="themeIcon">🌙</span>
                    <span id="themeText">深色模式</span>
                </button>
            </div>
        </header>

        <div class="no-records-content">
            <div class="no-records-icon">📭</div>
            <h2>无记录</h2>
            <p>
                抱歉，您访问的命名空间 <strong>{{ namespace }}</strong> 不存在或没有相关记录。
            </p>
            <div class="no-records-actions">
                <button class="action-btn secondary" onclick="window.history.back()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    返回上一页
                </button>
                <a href="/pipelines/records/view" class="action-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    查看所有记录
                </a>
                <a href="/cd-records" class="action-btn secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    查看CD记录
                </a>
            </div>

            <!-- 装饰性元素 -->
            <div class="decorative-elements">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
                <div class="circle circle-3"></div>
            </div>
        </div>
    </div>

    <style>
        /* 额外的装饰性样式 */
        .decorative-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-200), var(--primary-400));
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            bottom: 10%;
            left: -50px;
            animation-delay: 2s;
        }

        .circle-3 {
            width: 150px;
            height: 150px;
            top: 40%;
            right: 10%;
            animation-delay: 4s;
        }

        [data-theme="dark"] .circle {
            background: linear-gradient(135deg, var(--primary-700), var(--primary-500));
            opacity: 0.05;
        }

        /* 增强无记录页面的动画效果 */
        .no-records-icon {
            animation: float 3s ease-in-out infinite, pulse 2s ease-in-out infinite;
        }

        .no-records-content h2 {
            animation: slideUp 0.5s ease-out 0.2s backwards;
        }

        .no-records-content p {
            animation: slideUp 0.5s ease-out 0.3s backwards;
        }

        .no-records-actions {
            animation: slideUp 0.5s ease-out 0.4s backwards;
        }

        /* 按钮悬停效果增强 */
        .action-btn {
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .action-btn svg {
            transition: transform var(--transition-fast);
        }

        .action-btn:hover svg {
            transform: scale(1.1);
        }
    </style>

    <script>
        // 主题切换功能
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            // 更新按钮文本和图标
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');

            if (newTheme === 'dark') {
                themeIcon.textContent = '☀️';
                themeText.textContent = '浅色模式';
            } else {
                themeIcon.textContent = '🌙';
                themeText.textContent = '深色模式';
            }
        }

        // 页面加载时初始化主题
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (savedTheme === 'dark') {
                themeIcon.textContent = '☀️';
                themeText.textContent = '浅色模式';
            }
        });
    </script>
</body>
</html>
