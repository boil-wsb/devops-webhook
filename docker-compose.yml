version: '3.3'

services:
  devopsbot:
    image: 192.168.100.213:8083/devops/devops-webhook:${VERSION}
    container_name: devops_webhook
    ports:
      - 8032:8080
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./log:/app/logs
      - ./config/config.yaml:/app/config.yaml
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge
